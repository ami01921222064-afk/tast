<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LiveTrack — লোকেশন শেয়ার</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Noto+Sans+Bengali:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#06090f;--card:#161b22;--border:rgba(48,255,180,0.15);--accent:#30ffb4;--accent2:#ff6b35;--text:#cdd9e5;--muted:#545d68;--glow:0 0 24px rgba(48,255,180,0.3);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
    header{position:relative;z-index:100;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;background:rgba(13,17,23,0.97);border-bottom:1px solid var(--border);flex-shrink:0;}
    .brand{display:flex;align-items:center;gap:10px;}
    .brand-dot{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#00c87a);display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:var(--glow);}
    .brand h1{font-size:18px;font-weight:800;color:var(--accent);}
    .brand p{font-size:10px;color:var(--muted);font-family:'Noto Sans Bengali',sans-serif;}
    .page-tag{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);border:1px solid var(--border);padding:4px 12px;border-radius:20px;background:rgba(48,255,180,0.05);}
    .main{display:flex;flex:1;overflow:hidden;position:relative;}
    #map{position:absolute;inset:0;z-index:1;}
    .float-top{position:absolute;top:16px;left:50%;transform:translateX(-50%);z-index:200;width:calc(100% - 32px);max-width:380px;}
    .code-pill{background:rgba(13,17,23,0.95);border:1px solid var(--border);border-radius:16px;padding:14px 18px;backdrop-filter:blur(16px);text-align:center;}
    .code-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;font-family:'Noto Sans Bengali',sans-serif;}
    .code-num{font-size:28px;font-weight:800;letter-spacing:6px;color:var(--accent);cursor:pointer;padding:8px 14px;background:rgba(48,255,180,0.06);border:1.5px dashed rgba(48,255,180,0.3);border-radius:10px;display:inline-block;transition:all 0.2s;}
    .code-num:hover{background:rgba(48,255,180,0.12);}
    .copy-hint{font-size:10px;color:var(--muted);margin-top:5px;font-family:'Noto Sans Bengali',sans-serif;}
    .float-bottom{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);z-index:200;width:calc(100% - 32px);max-width:380px;display:flex;flex-direction:column;gap:10px;}
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
    .stat-box{background:rgba(13,17,23,0.92);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:10px;text-align:center;backdrop-filter:blur(12px);}
    .stat-box small{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:2px;}
    .stat-box span{font-size:14px;font-weight:700;color:var(--accent);}
    .live-badge{display:flex;align-items:center;justify-content:center;gap:8px;background:rgba(13,17,23,0.92);border:1px solid var(--border);border-radius:30px;padding:6px 16px;backdrop-filter:blur(12px);width:fit-content;margin:0 auto;}
    .live-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:lb 1s infinite;}
    @keyframes lb{0%,100%{opacity:1}50%{opacity:0.2}}
    .live-badge span{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);}
    .btn-main{width:100%;padding:15px;border:none;border-radius:14px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all 0.3s;background:linear-gradient(135deg,var(--accent),#00c87a);color:#06090f;box-shadow:var(--glow);}
    .btn-main:hover{transform:translateY(-2px);box-shadow:0 0 40px rgba(48,255,180,0.5);}
    .btn-main.stop{background:linear-gradient(135deg,var(--accent2),#cc4400);color:#fff;box-shadow:0 0 24px rgba(255,107,53,0.4);}
    .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card);border:1px solid var(--accent);color:var(--text);padding:10px 20px;border-radius:12px;font-size:12px;z-index:9999;opacity:0;transition:all 0.35s;pointer-events:none;white-space:nowrap;font-family:'Noto Sans Bengali',sans-serif;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .leaflet-control-zoom a{background:rgba(13,17,23,0.9)!important;color:var(--accent)!important;border:1px solid rgba(48,255,180,0.2)!important;}
  </style>
</head>
<body>
<header>
  <div class="brand">
    <div class="brand-dot">📡</div>
    <div><h1>LiveTrack</h1><p>লোকেশন শেয়ারার</p></div>
  </div>
  <div class="page-tag">SHARER</div>
</header>
<div class="main">
  <div id="map"></div>
  <div class="float-top">
    <div class="code-pill">
      <div class="code-label">তোমার ট্র্যাকিং কোড — অন্যকে দাও</div>
      <div class="code-num" id="codeDisplay" onclick="copyCode()">--------</div>
      <div class="copy-hint">👆 ট্যাপ করে কপি করো</div>
    </div>
  </div>
  <div class="float-bottom">
    <div class="stats-row" id="statsRow" style="display:none;">
      <div class="stat-box"><small>গতি</small><span id="speedVal">০</span><small style="font-size:9px;color:var(--muted);">km/h</small></div>
      <div class="stat-box"><small>নির্ভুলতা</small><span id="accVal">—</span><small style="font-size:9px;color:var(--muted);">মি</small></div>
      <div class="stat-box"><small>আপডেট</small><span id="updVal">০</span><small style="font-size:9px;color:var(--muted);">বার</small></div>
    </div>
    <div class="live-badge" id="liveBadge" style="display:none;">
      <div class="live-dot"></div><span>লাইভ চলছে</span>
    </div>
    <button class="btn-main" id="mainBtn" onclick="toggleShare()">📍 লোকেশন শেয়ার শুরু</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {apiKey:"AIzaSyCM82nQh-gMFiLo40KY_7aCc687I0m5A-w",authDomain:"tast-map-d5068.firebaseapp.com",databaseURL:"https://tast-map-d5068-default-rtdb.firebaseio.com",projectId:"tast-map-d5068",storageBucket:"tast-map-d5068.firebasestorage.app",messagingSenderId:"417954327551",appId:"1:417954327551:web:6f0d5cc805f002a9bf95ca"};
const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

function getCode(){let c=localStorage.getItem('lt_code');if(!c){c=Math.floor(1000000000+Math.random()*9000000000).toString();localStorage.setItem('lt_code',c);}return c;}
const userCode=getCode();
document.getElementById('codeDisplay').textContent=userCode.slice(0,5)+' '+userCode.slice(5);
window.copyCode=()=>navigator.clipboard.writeText(userCode).then(()=>showToast('✅ কোড কপি হয়েছে!'));

const map=L.map('map',{zoomControl:true,attributionControl:false}).setView([23.8103,90.4125],15);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:19}).addTo(map);

let marker=null,watchId=null,isSharing=false,updateCount=0,prevLat=null,prevLng=null,curHeading=0;

function makeIcon(h){
  return L.divIcon({
    className:'',
    html:`<div style="width:44px;height:44px;position:relative;">
      <div style="position:absolute;inset:0;background:radial-gradient(circle,#30ffb4 25%,rgba(48,255,180,0.15) 70%);border-radius:50%;border:3px solid rgba(255,255,255,0.9);box-shadow:0 0 0 6px rgba(48,255,180,0.2),0 0 24px rgba(48,255,180,0.8);"></div>
      <div style="position:absolute;top:50%;left:50%;width:16px;height:16px;margin-left:-8px;margin-top:-20px;transform:rotate(${h}deg);transform-origin:8px 20px;">
        <div style="width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-bottom:16px solid #30ffb4;filter:drop-shadow(0 0 3px #30ffb4);"></div>
      </div>
    </div>`,
    iconSize:[44,44],iconAnchor:[22,22]
  });
}

function calcHeading(lat1,lng1,lat2,lng2){
  const dL=(lng2-lng1)*Math.PI/180;
  const y=Math.sin(dL)*Math.cos(lat2*Math.PI/180);
  const x=Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180)-Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos(dL);
  return(Math.atan2(y,x)*180/Math.PI+360)%360;
}

function smoothMove(toLat,toLng){
  if(!marker){
    marker=L.marker([toLat,toLng],{icon:makeIcon(curHeading),zIndexOffset:1000}).addTo(map);
    map.setView([toLat,toLng],17,{animate:true});
    return;
  }
  const from=marker.getLatLng();
  const steps=25,dur=500;
  let i=0;
  const iv=setInterval(()=>{
    i++;
    const t=i/steps;
    const et=t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2; // ease in-out
    marker.setLatLng([from.lat+(toLat-from.lat)*et, from.lng+(toLng-from.lng)*et]);
    if(i>=steps){clearInterval(iv);marker.setLatLng([toLat,toLng]);}
  },dur/steps);
  map.panTo([toLat,toLng],{animate:true,duration:0.6,easeLinearity:0.5});
}

window.toggleShare=function(){isSharing?stopShare():startShare();};

function startShare(){
  if(!navigator.geolocation){showToast('❌ GPS সাপোর্ট নেই');return;}
  isSharing=true;
  document.getElementById('mainBtn').textContent='⏹ শেয়ার বন্ধ করো';
  document.getElementById('mainBtn').classList.add('stop');
  document.getElementById('statsRow').style.display='grid';
  document.getElementById('liveBadge').style.display='flex';

  const locRef=ref(db,`locations/${userCode}`);
  onDisconnect(locRef).update({active:false});

  watchId=navigator.geolocation.watchPosition(pos=>{
    const{latitude:lat,longitude:lng,accuracy:acc,speed,heading:h}=pos.coords;
    updateCount++;

    if(prevLat!==null){
      const moved=Math.abs(lat-prevLat)>0.000005||Math.abs(lng-prevLng)>0.000005;
      if(moved){
        curHeading=h!=null&&h>=0?h:calcHeading(prevLat,prevLng,lat,lng);
        if(marker) marker.setIcon(makeIcon(curHeading));
      }
    }
    prevLat=lat; prevLng=lng;

    smoothMove(lat,lng);
    set(locRef,{lat,lng,acc:Math.round(acc),heading:curHeading,speed:speed?Math.round(speed*3.6):0,timestamp:Date.now(),active:true});

    document.getElementById('speedVal').textContent=speed?Math.round(speed*3.6):0;
    document.getElementById('accVal').textContent=Math.round(acc);
    document.getElementById('updVal').textContent=updateCount;
  },{enableHighAccuracy:true,maximumAge:1000,timeout:10000});

  showToast('✅ লাইভ শেয়ার শুরু হয়েছে!');
}

function stopShare(){
  if(watchId)navigator.geolocation.clearWatch(watchId);
  set(ref(db,`locations/${userCode}`),{active:false});
  isSharing=false;
  document.getElementById('mainBtn').textContent='📍 লোকেশন শেয়ার শুরু';
  document.getElementById('mainBtn').classList.remove('stop');
  document.getElementById('statsRow').style.display='none';
  document.getElementById('liveBadge').style.display='none';
  showToast('⏹ শেয়ার বন্ধ');
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
</script>
</body>
</html>
